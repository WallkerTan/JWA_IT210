<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm công việc</title>
    <style>
        .error {
            color: red;
            font-size: 0.9em;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
<h1>Thêm công việc mới</h1>

<form th:action="@{/tasks}" th:object="${taskItem}" method="post">
    <div class="form-group">
        <label>ID</label>
        <input type="text" th:field="*{id}" />
        <div class="error" th:if="${#fields.hasErrors('id')}" th:errors="*{id}"></div>
    </div>

    <div class="form-group">
        <label>Title</label>
        <input type="text" th:field="*{title}" />
        <div class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
    </div>

    <div class="form-group">
        <label>Deadline</label>
        <input type="date" th:field="*{deadline}" />
        <div class="error" th:if="${#fields.hasErrors('deadline')}" th:errors="*{deadline}"></div>
    </div>

    <div class="form-group">
        <label>Priority</label>
        <select th:field="*{priority}">
            <option value="">-- Chọn priority --</option>
            <option th:each="p : ${priorities}" th:value="${p}" th:text="${p}"></option>
        </select>
        <div class="error" th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}"></div>
    </div>

    <button type="submit">Lưu</button>
    <a th:href="@{/tasks}">Quay lại danh sách</a>
</form>

</body>
</html>
